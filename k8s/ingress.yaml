apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskmanager-ingress
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: taskmanager-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: taskmanager-frontend
                port:
                  number: 80