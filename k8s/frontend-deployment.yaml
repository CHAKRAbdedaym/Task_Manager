apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmanager-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskmanager-frontend
  template:
    metadata:
      labels:
        app: taskmanager-frontend
    spec:
      containers:
        - name: frontend
          image: taskmanager-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
            - containerPort: 8080